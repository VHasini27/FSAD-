<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1f2a44, #3a4f7a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4e54c8;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="login-box">
<h2>Admin Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg" style="color:red;"></p>
</div>

<script>
function login() {
  let user = username.value;
  let pass = password.value;

  if (user === "admin" && pass === "1234") {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "index.html";
  } else {
    msg.innerText = "Invalid login 😢";
  }
}
</script>

</body>
</html>
